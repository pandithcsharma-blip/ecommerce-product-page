<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Page</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <!-- Product Image -->
  <div class="product-gallery">
    <img id="mainImage" src="C:\Users\DELL\Documents\Images\watch.jfif" alt="Product">
    
    <div class="thumbnails">
      <img src="C:\Users\DELL\Documents\Images\w2.jfif">
      <img src="C:\Users\DELL\Documents\Images\w3.jfif">
      <img src="C:\Users\DELL\Documents\Images\w4.jfif">
    </div>
  </div>

  <!-- Product Details -->
  <div class="product-details">
    <h1>Smart Watch</h1>
    <p class="price">₹4,999</p>
    <p>High quality smartwatch with health tracking features.</p>

    <!-- Quantity -->
    <div class="quantity">
      <button onclick="decrease()">-</button>
      <span id="qty">1</span>
      <button onclick="increase()">+</button>
    </div>

    <button class="cart-btn" onclick="addToCart()">Add to Cart</button>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
